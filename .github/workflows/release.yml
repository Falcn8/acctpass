name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.26.x"

jobs:
  release:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: ./...
          check-latest: true

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          version="${tag#v}"
          repo_root="$PWD"
          build_root="$(mktemp -d)"

          mkdir -p dist

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            name="acctpass_${version}_${goos}_${goarch}"
            package_dir="$build_root/$name"
            mkdir -p "$package_dir"

            binary="$package_dir/acctpass"
            if [ "$goos" = "windows" ]; then
              binary="$package_dir/acctpass.exe"
            fi

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "$binary" .
            cp README.md SECURITY.md LICENSE "$package_dir/"

            if [ "$goos" = "windows" ]; then
              (cd "$build_root" && zip -qr "$repo_root/dist/$name.zip" "$name")
            else
              (cd "$build_root" && tar -czf "$repo_root/dist/$name.tar.gz" "$name")
            fi
          done

          sha256sum dist/*.tar.gz dist/*.zip > dist/checksums.txt

      - name: Publish GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --verify-tag --title "$tag" --generate-notes
          fi
